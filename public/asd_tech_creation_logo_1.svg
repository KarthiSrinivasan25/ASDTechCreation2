<svg width="500" height="500" viewBox="0 0 500 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ASD Tech Creation Logo</title>
  <desc>Simple circular logo for ASD Tech Creation web development company.</desc>

  <!-- Outer circle -->
  <circle cx="250" cy="250" r="220" fill="#0a1628" stroke="#2a7de1" stroke-width="4"/>
  <circle cx="250" cy="250" r="200" fill="none" stroke="#2a7de1" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Browser window -->
  <rect x="135" y="130" width="230" height="155" rx="10" fill="none" stroke="#2a7de1" stroke-width="2.5"/>
  <!-- Navbar -->
  <rect x="135" y="130" width="230" height="34" rx="10" fill="#2a7de1"/>
  <rect x="135" y="152" width="230" height="12" fill="#2a7de1"/>
  <!-- Traffic lights -->
  <circle cx="158" cy="147" r="5.5" fill="#ff5f57"/>
  <circle cx="174" cy="147" r="5.5" fill="#febc2e"/>
  <circle cx="190" cy="147" r="5.5" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="206" y="138" width="120" height="18" rx="9" fill="#0a1628" opacity="0.55"/>
  <text x="266" y="151" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#90b8f0">asdtech.com</text>

  <!-- Page lines -->
  <rect x="155" y="182" width="110" height="7" rx="3.5" fill="#2a7de1" opacity="0.8"/>
  <rect x="155" y="196" width="80" height="5" rx="2.5" fill="#2a7de1" opacity="0.4"/>
  <rect x="155" y="207" width="95" height="5" rx="2.5" fill="#2a7de1" opacity="0.3"/>

  <!-- Button -->
  <rect x="155" y="248" width="68" height="20" rx="10" fill="#2a7de1"/>
  <text x="189" y="262" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#fff">Get Started</text>

  <!-- Right monitor -->
  <rect x="288" y="180" width="58" height="72" rx="5" fill="#1a2e4a"/>
  <rect x="296" y="188" width="42" height="30" rx="3" fill="#0a1628"/>
  <rect x="300" y="193" width="18" height="3" rx="1.5" fill="#2a7de1" opacity="0.9"/>
  <rect x="300" y="200" width="30" height="3" rx="1.5" fill="#5dcaa5" opacity="0.8"/>
  <rect x="300" y="207" width="22" height="3" rx="1.5" fill="#2a7de1" opacity="0.7"/>
  <rect x="312" y="222" width="6" height="5" rx="1" fill="#2a7de1" opacity="0.5"/>
  <rect x="300" y="230" width="26" height="3" rx="1.5" fill="#2a7de1" opacity="0.35"/>

  <!-- ASD brand text -->
  <text x="250" y="334" text-anchor="middle" font-family="sans-serif" font-size="46" font-weight="700" fill="#2a7de1" letter-spacing="6">ASD</text>
  <text x="250" y="358" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="400" fill="#90b8f0" letter-spacing="5">TECH CREATION</text>

  <!-- Divider -->
  <line x1="175" y1="370" x2="325" y2="370" stroke="#2a7de1" stroke-width="0.8" opacity="0.6"/>

  <!-- Tagline inside circle -->
  <text x="250" y="390" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a8abf" letter-spacing="3">INNOVATE · BUILD · DELIVER</text>

</svg>
