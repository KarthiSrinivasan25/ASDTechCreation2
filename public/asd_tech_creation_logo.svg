<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ASD Tech Creation — Web &amp; Android Logo</title>
  <desc>Circular logo for ASD Tech Creation with web browser and Android tech iconography</desc>
  <defs>
    <style>
      .bg-main { fill: #1a1a2e; }
      .bg-inner { fill: #16213e; }
      .bg-core { fill: #0f3460; }
      .ring1 { fill: none; stroke: #4ade80; stroke-width: 3; }
      .ring2 { fill: none; stroke: #22d3ee; stroke-width: 1.5; }
      .ring3 { fill: none; stroke: #4ade80; stroke-width: 0.8; opacity: 0.4; }
      .tick-maj { stroke: #4ade80; stroke-width: 2; stroke-linecap: round; }
      .tick-min { stroke: #22d3ee; stroke-width: 1; stroke-linecap: round; opacity: 0.5; }
      .dot-green { fill: #4ade80; }
      .dot-cyan { fill: #22d3ee; }
      .hex { fill: none; stroke: #22d3ee; stroke-width: 0.6; opacity: 0.25; }
    </style>
  </defs>

  <!-- Main background circle -->
  <circle cx="340" cy="340" r="300" class="bg-main"/>

  <!-- Hex grid texture -->
  <polygon points="340,100 358,110 358,130 340,140 322,130 322,110" class="hex"/>
  <polygon points="376,120 394,130 394,150 376,160 358,150 358,130" class="hex"/>
  <polygon points="304,120 322,130 322,150 304,160 286,150 286,130" class="hex"/>
  <polygon points="394,158 412,168 412,188 394,198 376,188 376,168" class="hex"/>
  <polygon points="286,158 304,168 304,188 286,198 268,188 268,168" class="hex"/>
  <polygon points="340,530 358,540 358,560 340,570 322,560 322,540" class="hex"/>
  <polygon points="376,510 394,520 394,540 376,550 358,540 358,520" class="hex"/>
  <polygon points="304,510 322,520 322,540 304,550 286,540 286,520" class="hex"/>

  <!-- Outer glow ring -->
  <circle cx="340" cy="340" r="298" class="ring3"/>

  <!-- Segmented outer ring arcs -->
  <path d="M340 45 A295 295 0 0 1 635 340" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M635 340 A295 295 0 0 1 340 635" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
  <path d="M340 635 A295 295 0 0 1 45 340" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M45 340 A295 295 0 0 1 340 45" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Tick marks -->
  <g transform="rotate(0,340,340)"><line x1="340" y1="47" x2="340" y2="68" class="tick-maj"/></g>
  <g transform="rotate(45,340,340)"><line x1="340" y1="47" x2="340" y2="60" class="tick-min"/></g>
  <g transform="rotate(90,340,340)"><line x1="340" y1="47" x2="340" y2="68" class="tick-maj"/></g>
  <g transform="rotate(135,340,340)"><line x1="340" y1="47" x2="340" y2="60" class="tick-min"/></g>
  <g transform="rotate(180,340,340)"><line x1="340" y1="47" x2="340" y2="68" class="tick-maj"/></g>
  <g transform="rotate(225,340,340)"><line x1="340" y1="47" x2="340" y2="60" class="tick-min"/></g>
  <g transform="rotate(270,340,340)"><line x1="340" y1="47" x2="340" y2="68" class="tick-maj"/></g>
  <g transform="rotate(315,340,340)"><line x1="340" y1="47" x2="340" y2="60" class="tick-min"/></g>
  <g transform="rotate(30,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>
  <g transform="rotate(60,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>
  <g transform="rotate(120,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>
  <g transform="rotate(150,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>
  <g transform="rotate(210,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>
  <g transform="rotate(240,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>
  <g transform="rotate(300,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>
  <g transform="rotate(330,340,340)"><line x1="340" y1="47" x2="340" y2="57" class="tick-min"/></g>

