  <rect x="195" y="196" width="110" height="18" rx="6" fill="#22d3ee" opacity="0.9"/>
  <rect x="195" y="205" width="110" height="9" fill="#22d3ee" opacity="0.9"/>
  <circle cx="207" cy="205" r="3" fill="#1a1a2e"/>
  <circle cx="216" cy="205" r="3" fill="#1a1a2e"/>
  <circle cx="225" cy="205" r="3" fill="#1a1a2e"/>
  <line x1="205" y1="228" x2="295" y2="228" stroke="#4ade80" stroke-width="1.5" opacity="0.8"/>
  <line x1="205" y1="240" x2="275" y2="240" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="205" y1="252" x2="285" y2="252" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="205" y1="264" x2="260" y2="264" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <text x="250" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="3">WEB</text>

  <!-- Android robot -->
  <rect x="378" y="214" width="74" height="56" rx="16" fill="#0f3460" stroke="#4ade80" stroke-width="2"/>
  <line x1="393" y1="214" x2="383" y2="200" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <circle cx="382" cy="198" r="3" fill="#4ade80"/>
  <line x1="437" y1="214" x2="447" y2="200" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <circle cx="448" cy="198" r="3" fill="#4ade80"/>
  <circle cx="402" cy="238" r="5" fill="#4ade80"/>
  <circle cx="428" cy="238" r="5" fill="#4ade80"/>
  <rect x="380" y="276" width="70" height="8" rx="4" fill="#4ade80" opacity="0.5"/>
  <text x="415" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#4ade80" letter-spacing="2">ANDROID</text>

  <!-- Center divider -->
  <line x1="180" y1="330" x2="500" y2="330" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>

