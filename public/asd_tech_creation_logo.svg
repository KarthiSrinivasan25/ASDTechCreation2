  <line x1="185" y1="415" x2="495" y2="415" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <text x="340" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#22d3ee" letter-spacing="5">TECH CREATION</text>

  <!-- Dot row -->
  <circle cx="300" cy="460" r="2.5" fill="#22d3ee"/>
  <circle cx="320" cy="460" r="2.5" fill="#4ade80"/>
  <circle cx="340" cy="460" r="2.5" fill="#22d3ee"/>
  <circle cx="360" cy="460" r="2.5" fill="#4ade80"/>
  <circle cx="380" cy="460" r="2.5" fill="#22d3ee"/>

  <!-- Bottom arc -->
  <path d="M200 490 A155 155 0 0 0 480 490" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Corner brackets -->
  <path d="M160 175 L148 175 L148 188" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <path d="M520 175 L532 175 L532 188" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <path d="M160 505 L148 505 L148 492" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <path d="M520 505 L532 505 L532 492" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
</svg>
