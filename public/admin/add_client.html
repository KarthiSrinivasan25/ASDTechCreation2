      <main class="dashboard-content">

          <section class="row g-3">
            <div class="col-12 ">
              <div class="card shadow-sm border-0">
                <div class="card-header text-white d-flex justify-content-between align-items-center" style=" background:linear-gradient(135deg,#eb7425,#e55146);">

                  <h5 class="mb-0">Add New Client</h5>

                  <a href="client.html" class="btn btn-light btn-sm">
                    <i class="bi bi-arrow-left"></i> Back
                  </a>

                </div>


                <div class="card-body">
                  <form method="POST" action="https://karthikeyanportfolio.helioho.st/api/save_client.php" class="row g-3">

                    <!-- Client Name -->
                    <div class="col-md-6">
                      <label class="form-label">Client Name</label>
                      <input type="text" name="client_name" class="form-control" required>
                    </div>

                    <!-- Company Name -->
                    <div class="col-md-6">
                      <label class="form-label">Company Name</label>
                      <input type="text" name="company_name" class="form-control" required>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <input type="email" name="email" class="form-control" required>
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6">
                      <label class="form-label">Phone</label>
                      <input type="text" name="phone" class="form-control" required>
                    </div>

                    <!-- Address -->
                    <div class="col-12">
                      <label class="form-label">Address</label>
                      <textarea name="address" class="form-control" required></textarea>
                    </div>

                    <!-- GST -->
                    <div class="col-md-6">
                      <label class="form-label">GST Number</label>
                      <input type="text" name="gst_number" class="form-control">
                    </div>

                    <!-- Project Name -->
                    <div class="col-md-6">
                      <label class="form-label">Project Name</label>
                      <input type="text" name="project_name" class="form-control" required>
                    </div>

                    <!-- Service -->
                    <div class="col-md-6">
                      <label class="form-label">Service</label>
                      <input type="text" name="service" class="form-control" placeholder="Web / App / SEO" required>
                    </div>

                    <!-- Project Value -->
                    <div class="col-md-6">
                      <label class="form-label">Project Value (₹)</label>
                      <input type="number" name="project_value" class="form-control" required>
                    </div>

                    <!-- Status -->
                    <div class="col-md-6">
                      <label class="form-label">Status</label>
                      <select name="status" class="form-select" required>
                        <option value="Active">Active</option>
                        <option value="Completed">Completed</option>
                        <option value="On Hold">On Hold</option>
                      </select>
                    </div>

                    <!-- Notes -->
                    <div class="col-12">
                      <label class="form-label">Notes</label>
                      <textarea name="notes" class="form-control" required></textarea>
                    </div>

                    <!-- Buttons -->
                    <div class="col-12 d-flex gap-2">
                      <button type="submit" class="btn btn-primary px-4">
                        Save Client
                      </button>

                      <button type="reset" class="btn btn-light border px-4">
                        Reset
                      </button>
                    </div>

                  </form>
                </div>
              </div>

  <script src="assets/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');

    if (status === 'success') {
      Swal.fire({
        icon: 'success',
        title: 'Success!',
        text: 'Client saved successfully',
        timer: 2000,
        showConfirmButton: false
      }).then(() => {
        window.location.href = "add_client.html";
      });
    }

    if (status === 'error') {
      Swal.fire({
        icon: 'error',
        title: 'Oops!',
        text: 'Something went wrong'
      });
    }


    document.addEventListener("DOMContentLoaded", function () {

      const form = document.querySelector("form");

      form.addEventListener("submit", function (e) {

        let isValid = true;
        let messages = [];

        const client_name = form.client_name.value.trim();
        const company_name = form.company_name.value.trim();
        const email = form.email.value.trim();
        const phone = form.phone.value.trim();
        const address = form.address.value.trim();
        //const gst_number = form.gst_number.value.trim();
        const project_name = form.project_name.value.trim();
        const service = form.service.value.trim();
        const project_value = form.project_value.value.trim();
        const status = form.status.value.trim();
        const notes = form.notes.value.trim();

        if (!client_name) {
          isValid = false;
          messages.push("Client Name required");
        }

        if (!company_name) {
          isValid = false;
          messages.push("Company Name required");
        }

        if (!email) {
          isValid = false;
          messages.push("Email required");
        }

        if (!phone) {
          isValid = false;
          messages.push("Phone required");
        }

        if (!address) {
          isValid = false;
          messages.push("Address required");
        }

        // if (!gst_number) {
        //     isValid = false;
        //     messages.push("GST Number required");
        // }

        if (!project_name) {
          isValid = false;
          messages.push("Project Name required");
        }

        if (!service) {
          isValid = false;
          messages.push("Service required");
        }

        if (!project_value) {
          isValid = false;
          messages.push("Project Value required");
        }

        if (!status) {
          isValid = false;
          messages.push("Status required");
        }

        if (!notes) {
          isValid = false;
          messages.push("Notes required");
        }

        if (!isValid) {
          e.preventDefault();

          alert("Please fill all fields:\n\n" + messages.join("\n"));
        }

      });

    });
  </script>
