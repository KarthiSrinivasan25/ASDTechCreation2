                        <div class="col-12 ">

">

                                        <div class="col-md-3">

<div class="col-md-3">

        <img id="signaturePreview"
             src=""
             style="max-height:80px;display:none;">
    </div>
</div>

                                        <!-- Notes -->

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

      <script>

const urlParams = new URLSearchParams(window.location.search);
const invoiceId = urlParams.get("id");

let signatures = [];


// =========================
// PAGE LOAD
// =========================

document.addEventListener("DOMContentLoaded", function(){

    loadInvoice();

});



// =========================
// LOAD SIGNATURES
// =========================

function loadSignatures(selectedId = ""){


    fetch("https://karthikeyanportfolio.helioho.st/api/signatures/get-signatures.php")

    .then(res => res.json())

    .then(data => {


        if(data.status){


            signatures = data.data;


            let html = `
            <option value="">
                Select Signature
            </option>
            `;


            signatures.forEach(item=>{


                html += `

                <option value="${item.id}">
                    ${item.name}
                </option>

                `;


            });



            document.getElementById("signature_id").innerHTML = html;



            if(selectedId){


                document.getElementById("signature_id").value = selectedId;


                showSignature(selectedId);


            }


        }


    });


}




// =========================
// SIGNATURE PREVIEW
// =========================

function showSignature(id){


    let sign = signatures.find(
        x => x.id == id
    );


    if(sign){


        document.getElementById("signaturePreview").src =
        sign.image_url;


        document.getElementById("signaturePreview").style.display =
        "block";


    }
    else{


        document.getElementById("signaturePreview").style.display =
        "none";


    }


}




document.addEventListener("change",function(e){


    if(e.target.id=="signature_id"){


        showSignature(e.target.value);


    }


});





// =========================
// LOAD CLIENTS
// =========================

function loadClients(selectedId=""){


fetch("https://karthikeyanportfolio.helioho.st/api/get_clients.php")

.then(res=>res.json())

.then(res=>{


let html =
`
<option value="">
Select Client
</option>
`;



res.data.forEach(client=>{


html += `

<option value="${client.id}"
${client.id==selectedId?"selected":""}>

${client.client_name} - ${client.company_name}

</option>

`;


});



document.getElementById("client_id").innerHTML = html;



});


}





// =========================
// LOAD INVOICE
// =========================


function loadInvoice(){


fetch("https://karthikeyanportfolio.helioho.st/api/invoice/get_invoice.php?id="+invoiceId)


.then(res=>res.json())


.then(res=>{


if(res.status!="success"){


Swal.fire(
"Error",
"Invoice not found",
"error"
);


return;


}



let inv = res.invoice;



document.getElementById("invoice_id").value =
inv.id;


document.getElementById("invoice_number").value =
inv.invoice_number;


document.getElementById("invoice_date").value =
inv.invoice_date;


document.getElementById("due_date").value =
inv.due_date;


document.getElementById("subtotal").value =
inv.subtotal;


document.getElementById("gst_percent").value =
inv.gst_percent;


document.getElementById("gst_amount").value =
inv.gst_amount;


document.getElementById("discount").value =
inv.discount;


document.getElementById("total_amount").value =
inv.total_amount;


document.getElementById("paid_amount").value =
inv.paid_amount;


document.getElementById("balance_amount").value =
inv.balance_amount;


document.getElementById("status").value =
inv.status;


document.getElementById("notes").value =
inv.notes;



loadClients(inv.client_id);


loadSignatures(inv.signature_id);




// ITEMS


let rows="";


res.items.forEach(item=>{


rows += `

<tr>

<td>

<input 
type="text"
name="item_name[]"
class="form-control"
value="${item.item_name}"
required>

</td>


<td>

<input
type="text"
name="description[]"
class="form-control"
value="${item.description}">

</td>



<td>

<input
type="number"
name="quantity[]"
class="form-control qty"
value="${item.quantity}">

</td>



<td>

<input
type="number"
name="unit_price[]"
class="form-control price"
value="${item.unit_price}">

</td>



<td>

<input
type="number"
name="total[]"
class="form-control total"
value="${item.total}"
readonly>

</td>



<td>

<button
type="button"
class="btn btn-danger btn-sm removeRow">

<i class="bi bi-trash"></i>

</button>

</td>


</tr>

`;


});



document.getElementById("invoiceItems").innerHTML =
rows;



calculateTotals();



});


}





// =========================
// ADD ROW
// =========================


document.getElementById("addRow").onclick=function(){


document.getElementById("invoiceItems")
.insertAdjacentHTML("beforeend",`


<tr>


<td>

<input
type="text"
name="item_name[]"
class="form-control"
required>

</td>


<td>

<input
type="text"
name="description[]"
class="form-control">

</td>


<td>

<input
type="number"
name="quantity[]"
class="form-control qty"
value="1">

</td>


<td>

<input
type="number"
name="unit_price[]"
class="form-control price"
value="0">

</td>


<td>

<input
type="number"
name="total[]"
class="form-control total"
readonly>

</td>


<td>

<button
type="button"
class="btn btn-danger btn-sm removeRow">

<i class="bi bi-trash"></i>

</button>


</td>


</tr>


`);


};






// =========================
// REMOVE ROW
// =========================


document.addEventListener("click",function(e){


if(e.target.closest(".removeRow")){


if(document.querySelectorAll("#invoiceItems tr").length>1){


e.target.closest("tr").remove();


calculateTotals();


}


}


});







// =========================
// CALCULATION
// =========================


document.addEventListener("input",function(e){


if(

e.target.classList.contains("qty") ||

e.target.classList.contains("price") ||

e.target.id=="gst_percent" ||

e.target.id=="discount" ||

e.target.id=="paid_amount"

){


calculateTotals();


}


});




function calculateTotals(){


let subtotal=0;



document.querySelectorAll("#invoiceItems tr")
.forEach(row=>{


let qty =
parseFloat(row.querySelector(".qty").value)||0;


let price =
parseFloat(row.querySelector(".price").value)||0;


let total = qty*price;



row.querySelector(".total").value =
total.toFixed(2);



subtotal += total;



});



document.getElementById("subtotal").value =
subtotal.toFixed(2);



let gst =
parseFloat(document.getElementById("gst_percent").value)||0;



let gstAmount =
subtotal*gst/100;



document.getElementById("gst_amount").value =
gstAmount.toFixed(2);



let discount =
parseFloat(document.getElementById("discount").value)||0;



let grand =
subtotal+gstAmount-discount;



document.getElementById("total_amount").value =
grand.toFixed(2);



let paid =
parseFloat(document.getElementById("paid_amount").value)||0;



let balance =
grand-paid;



document.getElementById("balance_amount").value =
balance.toFixed(2);



if(paid>=grand && grand>0){

document.getElementById("status").value="Paid";

}
else if(paid>0){

document.getElementById("status").value="Partial";

}
else{

document.getElementById("status").value="Pending";

}



}







// =========================
// UPDATE INVOICE
// =========================


document.getElementById("invoiceForm")
.addEventListener("submit",function(e){


e.preventDefault();



fetch("https://karthikeyanportfolio.helioho.st/api/invoice/update_invoice.php",{


method:"POST",


body:new FormData(this)


})


.then(res=>res.json())


.then(res=>{


if(res.status=="success"){


Swal.fire({

icon:"success",

title:"Updated",

text:res.message,

timer:1500,

showConfirmButton:false

})

.then(()=>{


window.location="invoice.html";


});


}
else{


Swal.fire(

"Error",

res.message,

"error"

);


}


});


});



</script>

   <script src="assets/js/logout.js"></script>
</body>
