    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
       document.addEventListener("DOMContentLoaded",()=>{

    loadSignatures();

});




function addSignature(){


let image =
document.getElementById("image").files[0];


if(!image){

    Swal.fire({
        icon:"warning",
        title:"Select Signature Image"
    });

    return;

}



let formData = new FormData();


formData.append(
"name",
document.getElementById("name").value
);



formData.append(
"image",
image
);




fetch("https://karthikeyanportfolio.helioho.st/api/signatures/add-signature.php",{


method:"POST",

body:formData


})


.then(res=>res.json())


.then(data=>{


Swal.fire({

    icon:data.status ? "success":"error",

    title:data.message

});



if(data.status){


    // Clear Input

    document.getElementById("name").value="";


    document.getElementById("image").value="";



    // Reload Table

    loadSignatures();


}



});


}









function loadSignatures(){


fetch("https://karthikeyanportfolio.helioho.st/api/signatures/get-signatures.php")


.then(res=>res.json())


.then(data=>{


if(data.status){


let html="";



data.data.forEach(item=>{


html += `

<tr>


<td>
${item.id}
</td>


<td>
${item.name}
</td>


<td>

<img src="${item.image_url}"
width="120">

</td>


<td>

<span class="badge bg-success">
Active
</span>

</td>



</tr>


`;



});



document.getElementById("signatureTable").innerHTML=html;



}



});


}
    </script>
