<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Invoice Verification</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f5f5f7;
        color: #2b2b2b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
    }
    .card {
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        max-width: 440px;
        width: 100%;
        overflow: hidden;
    }
    .card-header {
        background: linear-gradient(135deg,#eb7425,#e55146);
        color: #fff;
        padding: 24px;
        text-align: center;
    }
    .card-header.error-header {
        background: linear-gradient(135deg,#8a8a8a,#5a5a5a);
    }
    .badge-icon {
        width: 54px; height: 54px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 10px;
        font-size: 28px;
    }
    .card-header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    .card-header p { margin: 4px 0 0; font-size: 13px; opacity: 0.9; }
    .card-body { padding: 22px 24px; }
    .row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #f0f0f0;
        font-size: 14px;
    }
    .row:last-child { border-bottom: none; }
    .row .label { color: #6b6b6b; }
    .row .value { font-weight: 600; text-align: right; }
    .status-pill {
        display: inline-block;
        padding: 3px 12px;
        border-radius: 20px;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.3px;
    }
    .footer-note {
        text-align: center;
        font-size: 12px;
        color: #9a9a9a;
        padding: 14px 24px 22px;
    }
    .not-found {
        text-align: center;
        padding: 10px 4px 6px;
    }
    .badge-icon-error {
        width: 54px; height: 54px;
        border-radius: 50%;
        background: #fdecea;
        color: #f44336;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 14px;
        font-size: 28px;
    }
    .not-found h2 { font-size: 16px; margin: 0 0 6px; }
    .not-found p { font-size: 13px; color: #6b6b6b; margin: 0; }
    .loading {
        text-align: center;
        padding: 50px 24px;
        color: #6b6b6b;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="card" id="card">
    <div class="loading" id="loading">Verifying invoice...</div>
</div>

<script>
const STATUS_COLORS = {
    PAID: '#4caf50',
    PARTIAL: '#ffc107',
    PENDING: '#f44336'
};

// ⚠ ADJUST this URL to match where verify_invoice.php actually lives on your Helioho.st host
const API_URL = "https://karthikeyanportfolio.helioho.st/api/verify-pdf/verify-invoice.php";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const card = document.getElementById("card");

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function renderFound(companyName, data) {
    const statusUpper = (data.status || '').toUpperCase();
    const statusColor = STATUS_COLORS[statusUpper] || '#6b6b6b';

    card.innerHTML = `
        <div class="card-header">
            <div class="badge-icon">&#10003;</div>
            <h1>Genuine Invoice</h1>
            <p>Issued by ${escapeHtml(companyName)}</p>
        </div>
        <div class="card-body">
            <div class="row"><span class="label">Invoice No</span><span class="value">${escapeHtml(data.invoice_number)}</span></div>
            <div class="row"><span class="label">Invoice Date</span><span class="value">${escapeHtml(data.invoice_date)}</span></div>
            <div class="row"><span class="label">Due Date</span><span class="value">${escapeHtml(data.due_date)}</span></div>
            <div class="row"><span class="label">Billed To</span><span class="value">${escapeHtml(data.client_name)}</span></div>
            <div class="row"><span class="label">Total Amount</span><span class="value">Rs. ${Number(data.total_amount).toFixed(2)}</span></div>
            <div class="row">
                <span class="label">Status</span>
                <span class="value"><span class="status-pill" style="background-color:${statusColor};">${escapeHtml(statusUpper)}</span></span>
            </div>
        </div>
        <div class="footer-note">This invoice was verified against ${escapeHtml(companyName)}'s records.</div>
    `;
}

function renderNotFound(companyName) {
    card.innerHTML = `
        <div class="card-header error-header">
            <div class="badge-icon">&#33;</div>
            <h1>Verification Failed</h1>
        </div>
        <div class="card-body not-found">
            <div class="badge-icon-error">&#10007;</div>
            <h2>No matching invoice found</h2>
            <p>This link may be invalid, expired, or the invoice ID does not exist in our records.</p>
        </div>
        <div class="footer-note">If you believe this is an error, please contact ${escapeHtml(companyName || 'us')} directly.</div>
    `;
}

if (!id) {
    renderNotFound('');
} else {
    fetch(`${API_URL}?id=${encodeURIComponent(id)}`)
        .then(res => res.json())
        .then(res => {
            if (res.status && res.data) {
                renderFound(res.company_name, res.data);
            } else {
                renderNotFound(res.company_name);
            }
        })
        .catch(() => {
            renderNotFound('');
        });
}
</script>

</body>
</html>
