         <a class="nav-link" href="payments.html">

        <div class="admin-main">

            <main class="dashboard-content">

                    <section class="panel">
                        <div class="panel-header" style="border-bottom: 2px dashed #6c757d;">
                            <h2 class="h5 mb-3 section-title">
                                <span>Invoice</span>
                            </h2>

                            <div class="row align-items-center mb-3">
                                <div class="col-md-6">
                                    <input class="form-control form-control-sm table-search" type="search"
                                        placeholder="Search Invoice" data-table-search="ordersTable"
                                        aria-label="Search Invoice">
                                </div>

                                <div class="col-md-6 text-md-end mt-2 mt-md-0">
                                    <a href="add_invoice.html" class="btn btn-primary btn-sm">

                                        Add Invoice
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle">

                                <thead class="table-light">

                                    <tr>

                                        <th>#</th>

                                        <th>Invoice No</th>

                                        <th>Client</th>

                                        <th>Invoice Date</th>

                                        <th>Due Date</th>

                                        <th>Total</th>

                                        <th>Paid</th>

                                        <th>Balance</th>

                                        <th>Status</th>

                                        <th width="180">Action</th>

                                    </tr>

                                </thead>

                                <tbody id="invoiceTable">

                                </tbody>

                            </table>
                        </div>
                    </section>
                </div>
            </main>


        </div>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

        loadInvoices();

        function loadInvoices() {

            fetch("api/invoice/get_invoices.php")

                .then(res => res.json())

                .then(res => {

                    let html = "";

                    let i = 1;

                    res.data.forEach(inv => {

                        let badge = "";

                        if (inv.status == "Pending") {

                            badge = '<span class="badge bg-warning">Pending</span>';

                        }
                        else if (inv.status == "Partial") {

                            badge = '<span class="badge bg-info">Partial</span>';

                        }
                        else {

                            badge = '<span class="badge bg-success">Paid</span>';

                        }

                        html += `

<tr>

<td>${i++}</td>

<td>${inv.invoice_number}</td>

<td>

<b>${inv.client_name}</b><br>

<small>${inv.company_name}</small>

</td>

<td>${inv.invoice_date}</td>

<td>${inv.due_date}</td>

<td>₹ ${Number(inv.total_amount).toLocaleString()}</td>

<td>₹ ${Number(inv.paid_amount).toLocaleString()}</td>

<td>₹ ${Number(inv.balance_amount).toLocaleString()}</td>

<td>${badge}</td>

<td>

<a href="invoice_detail.html?id=${inv.id}"

class="btn btn-light btn-sm">

<i class="bi bi-eye"></i>

</a>

<a href="edit_invoice.html?id=${inv.id}"

class="btn btn-primary btn-sm">

<i class="bi bi-pencil"></i>

</a>

<button

class="btn btn-danger btn-sm"

onclick="deleteInvoice(${inv.id})">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

`;

                    });

                    document.getElementById("invoiceTable").innerHTML = html;

                });

        }

        function deleteInvoice(id) {

            Swal.fire({

                title: "Delete Invoice?",

                text: "This action cannot be undone.",

                icon: "warning",

                showCancelButton: true,

                confirmButtonText: "Delete"

            }).then((result) => {

                if (result.isConfirmed) {

                    fetch("api/invoice/delete_invoice.php?id=" + id)

                        .then(res => res.json())

                        .then(res => {

                            if (res.status == "success") {

                                Swal.fire({

                                    icon: "success",

                                    title: "Deleted",

                                    text: res.message,

                                    timer: 1500,

                                    showConfirmButton: false

                                });

                                loadInvoices();

                            } else {

                                Swal.fire({

                                    icon: "error",

                                    title: "Error",

                                    text: res.message

                                });

                            }

                        });

                }

            });

        }

    </script>
</body>

</html>
