    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>

        let signatures = [];


        document.addEventListener("DOMContentLoaded", async () => {

            await loadSignatures();

            await loadCompanyProfile();


            document
                .getElementById("signature_1_id")
                .addEventListener("change", function () {

                    showSignatureImage(
                        "signature1_preview",
                        this.value
                    );

                });



            document
                .getElementById("signature_2_id")
                .addEventListener("change", function () {

                    showSignatureImage(
                        "signature2_preview",
                        this.value
                    );

                });


        });





        // Load Signature Dropdown

        async function loadSignatures() {


            try {


                let response = await fetch(
                    "https://karthikeyanportfolio.helioho.st/api/signatures/get-signatures.php"
                );


                let data = await response.json();



                if (data.status) {


                    signatures = data.data;



                    let html = `
                <option value="">
                    Select Signature
                </option>
            `;



                    signatures.forEach(item => {


                        html += `

                <option value="${item.id}">
                    ${item.name}
                </option>

                `;


                    });



                    document
                        .getElementById("signature_1_id")
                        .innerHTML = html;



                    document
                        .getElementById("signature_2_id")
                        .innerHTML = html;



                }



            }
            catch (error) {

                console.log(
                    "Signature Load Error:",
                    error
                );

            }


        }








        // Load Company Profile

        async function loadCompanyProfile() {


            try {


                let response = await fetch(

                    "https://karthikeyanportfolio.helioho.st/api/company_profile/company-profile-get.php"

                );


                let data = await response.json();



                if (data.status) {



                    let c = data.data;

                    setFormDisabled(true);

document.getElementById("saveBtn").style.display = "none";

document.getElementById("editBtn").style.display = "inline-block";


                    Object.keys(c).forEach(key => {


                        let element =
                            document.getElementById(key);



                        if (element) {

                            element.value = c[key];

                        }


                    });





                    if (c.signature_1_id) {


                        document
                            .getElementById("signature_1_id")
                            .value = c.signature_1_id;



                        showSignatureImage(
                            "signature1_preview",
                            c.signature_1_id
                        );


                    }






                    if (c.signature_2_id) {


                        document
                            .getElementById("signature_2_id")
                            .value = c.signature_2_id;



                        showSignatureImage(
                            "signature2_preview",
                            c.signature_2_id
                        );


                    }





                }



            }
            catch (error) {


                console.log(
                    "Company Profile Error:",
                    error
                );


            }



        }









        // Show Signature Image

        function showSignatureImage(element, id) {



            let signature = signatures.find(
                item => item.id == id
            );



            if (signature) {



                document
                    .getElementById(element)
                    .src = signature.image_url;



            }
            else {


                document
                    .getElementById(element)
                    .src = "";

            }



        }


        function setFormDisabled(disabled) {

    document.querySelectorAll(
        "#company_name, #owner_name, #email, #phone, #address, #city, #state, #pincode, #gst_number, #pan_number, #website, #bank_name, #account_holder, #account_number, #ifsc_code, #upi_id, #invoice_prefix, #invoice_due_days, #signature_1_id, #signature_2_id"
    ).forEach(element => {

        element.disabled = disabled;

    });

}


function enableEdit() {

    setFormDisabled(false);

    document.getElementById("editBtn").style.display = "none";

    document.getElementById("saveBtn").style.display = "inline-block";

}









        // Save Profile

        function saveProfile() {



            let data = {



                company_name:
                    document.getElementById("company_name").value,


                owner_name:
                    document.getElementById("owner_name").value,


                email:
                    document.getElementById("email").value,


                phone:
                    document.getElementById("phone").value,


                address:
                    document.getElementById("address").value,


                city:
                    document.getElementById("city").value,


                state:
                    document.getElementById("state").value,


                pincode:
                    document.getElementById("pincode").value,


                gst_number:
                    document.getElementById("gst_number").value,


                pan_number:
                    document.getElementById("pan_number").value,


                website:
                    document.getElementById("website").value,


                bank_name:
                    document.getElementById("bank_name").value,


                account_holder:
                    document.getElementById("account_holder").value,


                account_number:
                    document.getElementById("account_number").value,


                ifsc_code:
                    document.getElementById("ifsc_code").value,


                upi_id:
                    document.getElementById("upi_id").value,


                invoice_prefix:
                    document.getElementById("invoice_prefix").value,


                invoice_due_days:
                    document.getElementById("invoice_due_days").value,



                signature_1_id:
                    document.getElementById("signature_1_id").value,



                signature_2_id:
                    document.getElementById("signature_2_id").value



            };




            fetch(
                "https://karthikeyanportfolio.helioho.st/api/company_profile/company-profile-save.php",
                {


                    method: "POST",


                    headers: {

                        "Content-Type": "application/json"

                    },


                    body: JSON.stringify(data)


                })

                .then(res => res.json())

               .then(result => {

    Swal.fire({

        icon: result.status ? "success" : "error",

        title: result.message

    });

    if(result.status){

        setFormDisabled(true);

        document.getElementById("saveBtn").style.display = "none";

        document.getElementById("editBtn").style.display = "inline-block";

    }

});


        }


    </script>
