<input type="hidden" id="id" name="id">

type="text"

class="form-control"
readonly>

<input
type="text"
id="invoice_number"
class="form-control"
readonly>

<input

id="payment_date"
name="payment_date"
class="form-control"
required>

</div>

<div class="col-md-4">

<input

id="total_amount"
class="form-control"
readonly>

</div>

<div class="col-md-4">

</select>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>

const id=new URLSearchParams(window.location.search).get("id");

fetch("https://karthikeyanportfolio.helioho.st/api/payments/get_payment.php?id="+id)

.then(res=>res.json())

.then(res=>{

if(res.status!="success") return;

const d=res.data;

document.getElementById("id").value=d.id;
document.getElementById("client_id").value=d.client_id;
document.getElementById("invoice_id").value=d.invoice_id;

document.getElementById("receipt_number").value=d.receipt_number;
document.getElementById("client_name").value=d.client_name;
document.getElementById("invoice_number").value=d.invoice_number;

document.getElementById("payment_date").value=d.payment_date;

document.getElementById("total_amount").value=d.total_amount;
document.getElementById("paid_amount").value=d.paid_amount;
document.getElementById("balance_amount").value=d.balance_amount;

document.getElementById("amount_paid").value=d.amount_paid;

document.getElementById("payment_method").value=d.payment_method;

document.getElementById("transaction_id").value=d.transaction_id;

document.getElementById("notes").value=d.notes;

});

document.getElementById("editPaymentForm")

.addEventListener("submit",function(e){

e.preventDefault();

fetch("https://karthikeyanportfolio.helioho.st/api/payments/update_payment.php",{

method:"POST",

body:new FormData(this)

})

.then(res=>res.json())

.then(res=>{

if(res.status=="success"){

Swal.fire({

icon:"success",

title:"Updated",

text:res.message,

timer:1500,

showConfirmButton:false

}).then(()=>{

window.location="payments.html";

});

}else{

Swal.fire({

icon:"error",

title:"Error",

text:res.message

});

}

});

});

</script>
