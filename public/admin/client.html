    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            loadClients();
        });

        function loadClients() {

            fetch("https://karthikeyanportfolio.helioho.st/api/get_clients.php")
                .then(res => res.json())
                .then(res => {

                    let html = "";

                    if (res.status === "success") {

                        res.data.forEach(row => {

                            let statusBadge = "";

                            if (row.status === "Active") {
                                statusBadge = `<span class="badge text-bg-success">Active</span>`;
                            } else if (row.status === "Completed") {
                                statusBadge = `<span class="badge text-bg-info">Completed</span>`;
                            } else {
                                statusBadge = `<span class="badge text-bg-warning">On Hold</span>`;
                            }

                            html += `
                <tr>

                    <td class="fw-semibold">${row.client_name}</td>

                    <td>
                        <div class="table-media">
                            <span>${row.company_name}</span>
                        </div>
                    </td>

                    <td>${row.phone}</td>

                    <td>${row.email}</td>

                    <td>${statusBadge}</td>

                    <td>₹${Number(row.project_value).toLocaleString()}</td>

                    <td class="text-end">

                       <button class="btn btn-light btn-sm"
    onclick="window.location.href='client_details.html?id=${row.id}'">
    View
</button>

                        <a href="edit_client.html?id=${row.id}"
                           class="btn btn-primary btn-sm">
                           Edit
                        </a>

                        <button class="btn btn-danger btn-sm"
                            onclick="deleteClient(${row.id})">
                            Delete
                        </button>

                    </td>

                </tr>
                `;
                        });

                    } else {
                        html = `<tr><td colspan="7" class="text-center">No data found</td></tr>`;
                    }

                    document.getElementById("clientTableBody").innerHTML = html;
                });
        }


        function deleteClient(id) {

            Swal.fire({
                title: 'Are you sure?',
                text: "This client will be permanently deleted!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Yes, delete it!'
            }).then((result) => {

                if (result.isConfirmed) {

                    fetch("https://karthikeyanportfolio.helioho.st/api/delete_client.php?id=" + id)
                        .then(res => res.json())
                        .then(res => {

                            if (res.status === "success") {

                                Swal.fire({
                                    icon: 'success',
                                    title: 'Deleted!',
                                    text: 'Client has been deleted successfully',
                                    timer: 1500,
                                    showConfirmButton: false
                                });

                                loadClients(); // refresh table

                            } else {

                                Swal.fire({
                                    icon: 'error',
                                    title: 'Error!',
                                    text: res.message || 'Delete failed'
                                });

                            }

                        })
                        .catch(() => {
                            Swal.fire({
                                icon: 'error',
                                title: 'Server Error',
                                text: 'Please try again later'
                            });
                        });
                }
            });
        }
    </script>
      <script src="assets/js/login.js"></script>
