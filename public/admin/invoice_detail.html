    <script src="assets/js/bootstrap.bundle.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get("id");

        fetch("https://karthikeyanportfolio.helioho.st/api/invoice/get_invoice.php?id=" + id)
            .then(res => res.json())
            .then(res => {

                if (res.status != "success") {

                    document.getElementById("invoiceCard").innerHTML = `

<div class="card-body text-center text-danger">

<h4>Invoice Not Found</h4>

</div>

`;

                    return;

                }

                const inv = res.invoice;
                const items = res.items;

                let badge = "";

                if (inv.status == "Pending") {

                    badge = '<span class="badge bg-warning">Pending</span>';

                }
                else if (inv.status == "Partial") {

                    badge = '<span class="badge bg-info">Partial</span>';

                }
                else {

                    badge = '<span class="badge bg-success">Paid</span>';

                }

                // item rows will come in Part-2

                let itemRows = "";

                document.getElementById("invoiceCard").innerHTML = `

<div class="invoice-profile">

<div class="invoice-header">

<div class="d-flex justify-content-between align-items-center">

<div class="d-flex align-items-center">

<div class="company-logo">

<i class="bi bi-receipt"></i>

</div>

<div class="ms-4">

<h2 class="mb-1">

Invoice

</h2>

<div>${inv.invoice_number}</div>

${badge}

</div>

</div>

<div>

<a href="edit_invoice.html?id=${inv.id}"

class="btn btn-light me-2">

<i class="bi bi-pencil"></i>

Edit

</a>

<a href="https://karthikeyanportfolio.helioho.st/api/invoice/generate_invoice_pdf.php?id=${inv.id}"
   target="_blank"
   class="btn btn-warning text-white me-2">
    <i class="bi bi-file-earmark-pdf"></i>
    Download PDF
</a>

<button class="btn btn-success" id="sendInvoice">
    <i class="bi bi-envelope-fill"></i>
    Send Invoice
</button>

<a href="invoice.html"

class="btn btn-outline-light">

<i class="bi bi-arrow-left"></i>

Back

</a>

</div>

</div>

</div>

<div class="card-body p-4">

<div class="row g-4">

<div class="col-md-6">

<div class="card info-card">

<div class="card-header">

Company Information

</div>

<div class="card-body">

<h4 class="text-primary">

ASD TechCreation

</h4>

<div>Chennai, Tamil Nadu</div>

<div>Email : info@asdtechcreation.com</div>

<div>Phone : +91 XXXXX XXXXX</div>

</div>

</div>

</div>

<div class="col-md-6">

<div class="card info-card">

<div class="card-header">

Invoice Information

</div>

<div class="card-body">

<div class="info-item">

<small>Invoice Number</small>

<div>${inv.invoice_number}</div>

</div>

<div class="info-item">

<small>Invoice Date</small>

<div>${inv.invoice_date}</div>

</div>

<div class="info-item">

<small>Due Date</small>

<div>${inv.due_date}</div>

</div>

<div class="info-item">

<small>Status</small>

<div>${badge}</div>

</div>

</div>

</div>

</div>

<div class="col-12">

<div class="card info-card">

<div class="card-header">

Client Information

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<strong>${inv.client_name}</strong>

<br>

${inv.company_name}

<br>

${inv.email}

<br>

${inv.phone}

</div>

<div class="col-md-6">

${inv.address}

<br>

GST : ${inv.gst_number}

</div>

</div>

</div>

</div>

</div>

<div class="col-12">

<div class="card info-card">

<div class="card-header">

Invoice Items

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered invoice-table">

<thead>

<tr>

<th>#</th>

<th>Item</th>

<th>Description</th>

<th width="80">Qty</th>

<th width="120">Price</th>

<th width="120">Total</th>

</thead>

<tbody>

${items.map((item, index) => `

<tr>

<td>${index + 1}</td>

<td>${item.item_name}</td>

<td>${item.description}</td>

<td>${item.quantity}</td>

<td>₹ ${Number(item.unit_price).toLocaleString()}</td>

<td>₹ ${Number(item.total).toLocaleString()}</td>

</tr>

`).join("")}

</tbody>

</table>

</div>

</div>

</div>

</div>



<div class="col-lg-6">

<div class="card info-card">

Notes

</div>

<div class="card-body">

<div class="total-box">

${inv.notes ? inv.notes : "No notes available."}

</div>

</div>

</div>

</div>



<div class="col-lg-6">

<div class="card info-card">

<div class="card-header">

Payment Summary

</div>

<div class="card-body">

<div class="total-box">

<div class="summary-row">

<span>Subtotal</span>

<span>

₹ ${Number(inv.subtotal).toLocaleString()}

</span>

</div>

<hr>

<div class="summary-row">

<span>GST (${inv.gst_percent}%)</span>

<span>

₹ ${Number(inv.gst_amount).toLocaleString()}

</span>

</div>

<hr>

<div class="summary-row">

<span>Discount</span>

<span>

₹ ${Number(inv.discount).toLocaleString()}

</span>

</div>

<hr>

<div class="summary-row">

<strong>Total Amount</strong>

<strong class="text-primary">

₹ ${Number(inv.total_amount).toLocaleString()}

</strong>

</div>

<hr>

<div class="summary-row">

<span>Paid Amount</span>

<span class="text-success fw-bold">

₹ ${Number(inv.paid_amount).toLocaleString()}

</span>

</div>

<hr>

<div class="summary-row">

<strong>Balance</strong>

<strong class="text-danger">

₹ ${Number(inv.balance_amount).toLocaleString()}

</strong>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

`;

document.getElementById("sendInvoice").addEventListener("click", function () {
    const btn = this;
    const originalHtml = btn.innerHTML;
 
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Sending...';
 
    // Show a non-dismissible loading dialog while the request is in flight
    Swal.fire({
        title: "Sending Invoice...",
        text: "Please wait while we email the invoice to the client.",
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });
 
    fetch("https://karthikeyanportfolio.helioho.st/api/invoice/send_invoice_email.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: inv.id })
    })
        .then(res => res.json())
        .then(res => {
            if (res.status === "success") {
                Swal.fire({
                    icon: "success",
                    title: "Invoice Sent!",
                    text: res.message,
                    confirmButtonColor: "#eb7425"
                });
            } else {
                Swal.fire({
                    icon: "error",
                    title: "Failed to Send",
                    text: res.message || "Something went wrong. Please try again.",
                    confirmButtonColor: "#eb7425"
                });
            }
        })
        .catch(() => {
            Swal.fire({
                icon: "error",
                title: "Network Error",
                text: "Could not reach the server. Please check your connection and try again.",
                confirmButtonColor: "#eb7425"
            });
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        });
});
 
    });


       
    </script>
