  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

// LOAD CLIENT DATA
fetch("https://karthikeyanportfolio.helioho.st/api/get_client.php?id=" + id)
.then(res => res.json())
.then(res => {

    if (res.status === "success") {
        const d = res.data;

        document.getElementById("id").value = d.id;
        document.getElementById("client_name").value = d.client_name;
        document.getElementById("company_name").value = d.company_name;
        document.getElementById("email").value = d.email;
        document.getElementById("phone").value = d.phone;
        document.getElementById("address").value = d.address;
        document.getElementById("gst_number").value = d.gst_number;
        document.getElementById("project_name").value = d.project_name;
        document.getElementById("service").value = d.service;
        document.getElementById("project_value").value = d.project_value;
        document.getElementById("status").value = d.status;
        document.getElementById("notes").value = d.notes;
    }
});

// UPDATE FORM
document.getElementById("editForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("https://karthikeyanportfolio.helioho.st/api/update_client.php", {
        method: "POST",
        body: new FormData(this)
    })
    .then(res => res.json())
    .then(res => {

        if (res.status === "success") {

            Swal.fire({
                icon: 'success',
                title: 'Updated!',
                text: res.message,
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "client.html";
            });

        } else {

            Swal.fire({
                icon: 'error',
                title: 'Error!',
                text: res.message
            });

        }

    });
});
</script>
